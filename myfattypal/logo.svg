<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MyFattyPal logo — a happy chubby guy">
  <!-- legs -->
  <rect x="22.5" y="52" width="7" height="10" rx="3.5" fill="#2a3140"/>
  <rect x="34.5" y="52" width="7" height="10" rx="3.5" fill="#2a3140"/>
  <!-- arms -->
  <ellipse cx="11" cy="43" rx="5" ry="8.5" fill="#ffd9b3"/>
  <ellipse cx="53" cy="43" rx="5" ry="8.5" fill="#ffd9b3"/>
  <!-- belly / body (blue shirt) -->
  <ellipse cx="32" cy="44" rx="21.5" ry="17.5" fill="#1875ff"/>
  <ellipse cx="32" cy="47" rx="12" ry="10" fill="#3b8bff" opacity=".55"/>
  <!-- head -->
  <circle cx="32" cy="20" r="13" fill="#ffd9b3"/>
  <!-- double chin over the collar -->
  <ellipse cx="32" cy="31.5" rx="9.5" ry="5" fill="#ffd9b3"/>
  <!-- cheeks -->
  <circle cx="23.5" cy="22.5" r="3.4" fill="#ffb0a0" opacity=".7"/>
  <circle cx="40.5" cy="22.5" r="3.4" fill="#ffb0a0" opacity=".7"/>
  <!-- eyes -->
  <circle cx="27" cy="18.5" r="1.8" fill="#2a3140"/>
  <circle cx="37" cy="18.5" r="1.8" fill="#2a3140"/>
  <!-- big smile -->
  <path d="M25.5 24 Q32 30 38.5 24" fill="none" stroke="#2a3140" stroke-width="2.2" stroke-linecap="round"/>
  <!-- hair tuft -->
  <path d="M24 9.5 Q32 3.5 40 9.5" fill="none" stroke="#7a4a28" stroke-width="3" stroke-linecap="round"/>
</svg>
